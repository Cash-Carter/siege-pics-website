<body class="gif-bg">
    <div>
        <button class="big-button" id="button" onclick="move(button)">
            Press me :3
        </button>

        <script>
            function move(element){
                var rand = Math.random() * (93 - 7 + 1) + 7;
                var rand2 = Math.random() * (90 - 3 + 1) + 3;
                element.style.top = Number(rand)+"%";
                element.style.left = Number(rand2)+"%";
            }

            if (document.getElementById(button).matches(':hover')){
                button.style.left = Number(2)+"%";
            }
        </script>
    </div>
</body>
